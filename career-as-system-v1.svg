<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="zc-t zc-d">
  <title id="zc-t">CAREER · COMPOUNDING LEVERAGE</title>
  <desc id="zc-d">Stock-and-flow diagram of Alonzo Williams' career as a system. COMPOUNDING LEVERAGE is the central stock on a horizontal pipe between source and sink clouds. Experience accumulation is a T-fitting on the inflow side. Applied work is a T-fitting on the outflow side. Three loops share the stock: L1 reputation flywheel (rust, reinforcing), L2 AI leverage compound (deeper rust, reinforcing), L3 energy limit (sage thin dotted, balancing brake).</desc>
  <defs>
    <style>
      :root {
        --bg: #FAFAF8; --paper: #F2EEE3; --cloud: #FFFDF8; --cloud-shadow: #E2DFD6;
        --text: #2A2A35; --muted: #6B6873; --muted2: #9D9A95; --line: #E2DFD6;
        --flow: #B8AD95; --flow-dark: #8E846F;
        --rust: #A85B49; --rust-soft: #EDD8CE; --rust-deep: #823F30;
        --sage: #5A8270; --sage-soft: #DEE8E1;
        --broken: #B83A2A;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23; --paper: #1E2128; --cloud: #2B2722; --cloud-shadow: #3A342C;
          --text: #E8E5DC; --muted: #B8B5AD; --muted2: #908D87; --line: #3E3D38;
          --flow: #8E846F; --flow-dark: #B8AD95;
          --rust: #D29183; --rust-soft: #3D2925; --rust-deep: #E3A292;
          --sage: #92BAA6; --sage-soft: #233029;
          --broken: #FF8C73;
        }
      }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      [fill="#FAFAF8"] { fill: var(--bg); } [fill="#F2EEE3"] { fill: var(--paper); }
      [fill="#FFFDF8"] { fill: var(--cloud); } [fill="#E2DFD6"] { fill: var(--cloud-shadow); }
      [fill="#2A2A35"] { fill: var(--text); } [stroke="#2A2A35"] { stroke: var(--text); }
      [fill="#6B6873"] { fill: var(--muted); }
      [fill="#9D9A95"] { fill: var(--muted2); } [stroke="#9D9A95"] { stroke: var(--muted2); }
      [fill="#B8AD95"] { fill: var(--flow); } [stroke="#B8AD95"] { stroke: var(--flow); }
      [fill="#8E846F"] { fill: var(--flow-dark); }
      [fill="#A85B49"] { fill: var(--rust); } [stroke="#A85B49"] { stroke: var(--rust); }
      [fill="#EDD8CE"] { fill: var(--rust-soft); }
      [fill="#823F30"] { fill: var(--rust-deep); } [stroke="#823F30"] { stroke: var(--rust-deep); }
      [fill="#5A8270"] { fill: var(--sage); } [stroke="#5A8270"] { stroke: var(--sage); }
      [fill="#DEE8E1"] { fill: var(--sage-soft); }
      [stroke="#B83A2A"] { stroke: var(--broken); } [fill="#B83A2A"] { fill: var(--broken); }
    </style>
    <marker id="zc-flow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="5.5" markerHeight="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8E846F"/>
    </marker>
    <marker id="zc-info" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#2A2A35"/>
    </marker>
    <marker id="zc-info-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#A85B49"/>
    </marker>
    <marker id="zc-info-r2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#823F30"/>
    </marker>
    <marker id="zc-info-sage" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#5A8270"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="540" fill="#F2EEE3"/>

  <!-- HEADER -->
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#A85B49" letter-spacing="0.04em">CAREER · COMPOUNDING LEVERAGE</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#6B6873">a reputation flywheel, an AI leverage compound, and an energy brake, sharing one stock</text>

  <!-- ─────────── MAIN PIPE ─────────── -->

  <!-- Source cloud (left) -->
  <path d="M 34 156 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#E2DFD6" opacity="0.65"/>
  <path d="M 30 152 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#FFFDF8" stroke="#2A2A35" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="70" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6873" class="serif">hard problems · new domains · mentors</text>

  <!-- Pipe: source → experience T -->
  <line x1="105" y1="155" x2="158" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt"/>

  <!-- Experience T-fitting -->
  <g stroke="#2A2A35" stroke-linecap="butt">
    <line x1="160" y1="155" x2="200" y2="155" stroke-width="12.5"/>
    <line x1="180" y1="155" x2="180" y2="180" stroke-width="12.5"/>
  </g>
  <text x="180" y="92" text-anchor="middle" font-size="14" font-style="italic" fill="#2A2A35" class="serif">experience</text>
  <text x="180" y="108" text-anchor="middle" font-size="14" font-style="italic" fill="#2A2A35" class="serif">accumulation</text>

  <!-- Pipe: experience T → stock -->
  <line x1="200" y1="155" x2="258" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt" marker-end="url(#zc-flow)"/>

  <!-- STOCK: COMPOUNDING LEVERAGE -->
  <rect x="258" y="118" width="200" height="74" fill="#FFFDF8" stroke="#2A2A35" stroke-width="1.75"/>
  <text x="358" y="146" text-anchor="middle" font-size="14.5" fill="#2A2A35" class="serif">compounding</text>
  <text x="358" y="164" text-anchor="middle" font-size="14.5" fill="#2A2A35" class="serif">leverage</text>
  <text x="358" y="181" text-anchor="middle" font-size="9.5" font-style="italic" fill="#6B6873" class="serif">patterns · reputation · tooling</text>

  <!-- Pipe: stock → applied work T -->
  <line x1="458" y1="155" x2="518" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt"/>

  <!-- Applied work T-fitting -->
  <g stroke="#2A2A35" stroke-linecap="butt">
    <line x1="520" y1="155" x2="560" y2="155" stroke-width="12.5"/>
    <line x1="540" y1="155" x2="540" y2="180" stroke-width="12.5"/>
  </g>
  <text x="540" y="92" text-anchor="middle" font-size="14" font-style="italic" fill="#2A2A35" class="serif">applied</text>
  <text x="540" y="108" text-anchor="middle" font-size="14" font-style="italic" fill="#2A2A35" class="serif">work</text>

  <!-- Pipe: applied work T → sink cloud -->
  <line x1="560" y1="155" x2="618" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt" marker-end="url(#zc-flow)"/>

  <!-- Sink cloud (right) -->
  <path d="M 628 156 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#E2DFD6" opacity="0.65"/>
  <path d="M 624 152 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#FFFDF8" stroke="#2A2A35" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="660" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6873" class="serif">shipped systems · shared patterns</text>

  <!-- ─────────── INFO-LINK SOURCE PORTS ─────────── -->
  <!-- Stock bottom port A, LEFT-offset (origin of L1 reputation flywheel) -->
  <circle cx="310" cy="192" r="3.5" fill="#F2EEE3" stroke="#A85B49" stroke-width="1.6"/>
  <!-- Stock bottom port B, RIGHT-offset (origin of L2 AI leverage chain) -->
  <circle cx="405" cy="192" r="3.5" fill="#F2EEE3" stroke="#823F30" stroke-width="1.6"/>
  <!-- Experience T-fitting bottom port (inflow target for L1 and L2 closing legs) -->
  <circle cx="180" cy="183" r="3.2" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.25"/>
  <!-- Applied work T-fitting bottom port (origin of L3 energy chain) -->
  <circle cx="540" cy="183" r="3.2" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.25"/>

  <!-- ─────────── AUXILIARY NODES ─────────── -->

  <!-- Harder problems offered (L1) -->
  <circle cx="270" cy="295" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="262" y="293" text-anchor="end" font-size="13" fill="#2A2A35" class="serif">harder problems</text>
  <text x="262" y="307" text-anchor="end" font-size="13" fill="#2A2A35" class="serif">offered</text>
  <text x="262" y="320" text-anchor="end" font-size="9.5" font-style="italic" fill="#6B6873" class="serif">CEO callbacks · founder consults</text>

  <!-- Tooling investment (L2 first node) -->
  <circle cx="420" cy="295" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="428" y="293" font-size="13" fill="#2A2A35" class="serif">tooling</text>
  <text x="428" y="307" font-size="13" fill="#2A2A35" class="serif">investment</text>

  <!-- Time freed (L2 second node) -->
  <circle cx="215" cy="370" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="207" y="368" text-anchor="end" font-size="13" fill="#2A2A35" class="serif">time freed</text>
  <text x="207" y="382" text-anchor="end" font-size="9.5" font-style="italic" fill="#6B6873" class="serif">briefs in hours, not days</text>

  <!-- Workload pulled (L3 first node) -->
  <circle cx="600" cy="295" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="608" y="299" font-size="13" fill="#2A2A35" class="serif">workload pulled</text>

  <!-- Personal energy (L3 second node) -->
  <circle cx="495" cy="395" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="503" y="392" font-size="13" fill="#2A2A35" class="serif">personal</text>
  <text x="503" y="406" font-size="13" fill="#2A2A35" class="serif">energy</text>

  <!-- ─────────── INFO LINKS ─────────── -->

  <!-- L1 segment A: stock left-port → harder problems offered -->
  <path d="M 310 195 C 295 230, 280 265, 272 291" stroke="#A85B49" stroke-width="1.7" fill="none" marker-end="url(#zc-info-r)"/>

  <!-- L1 segment B: harder problems offered → experience T port -->
  <path d="M 266 295 C 215 270, 185 225, 178 184" stroke="#A85B49" stroke-width="1.7" fill="none" marker-end="url(#zc-info-r)"/>

  <!-- L2 segment A: stock right-offset port → tooling investment -->
  <path d="M 405 195 C 410 230, 415 270, 420 291" stroke="#823F30" stroke-width="1.7" fill="none" marker-end="url(#zc-info-r2)"/>

  <!-- L2 segment B: tooling investment → time freed -->
  <path d="M 416 298 C 350 345, 270 365, 219 369" stroke="#823F30" stroke-width="1.7" fill="none" marker-end="url(#zc-info-r2)"/>

  <!-- L2 segment C: time freed → experience T port -->
  <path d="M 212 366 C 165 320, 150 235, 178 184" stroke="#823F30" stroke-width="1.7" fill="none" marker-end="url(#zc-info-r2)"/>

  <!-- L3 segment A: applied work T port → workload pulled -->
  <path d="M 540 184 Q 580 235 598 291" stroke="#5A8270" stroke-width="1.2" fill="none" stroke-dasharray="2,3" opacity="0.7" marker-end="url(#zc-info-sage)"/>

  <!-- L3 segment B: workload pulled → personal energy -->
  <path d="M 598 298 C 570 335, 530 375, 499 391" stroke="#5A8270" stroke-width="1.2" fill="none" stroke-dasharray="2,3" opacity="0.7" marker-end="url(#zc-info-sage)"/>

  <!-- L3 segment C: personal energy → experience T port (closing the brake on the inflow rate) -->
  <path d="M 491 395 C 360 445, 155 420, 178 186" stroke="#5A8270" stroke-width="1.2" fill="none" stroke-dasharray="2,3" opacity="0.7" marker-end="url(#zc-info-sage)"/>

  <!-- ─────────── ARCHETYPE ANNOTATION ─────────── -->
  <line x1="40" y1="500" x2="680" y2="500" stroke="#E2DFD6" stroke-width="1"/>
  <text x="360" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#6B6873" letter-spacing="0.06em">SUCCESS TO THE SUCCESSFUL</text>
  <text x="360" y="535" text-anchor="middle" font-size="11" fill="#6B6873">Each problem solved feeds the toolkit that makes the next one easier. AI leverage widens the inflow further.</text>
</svg>
