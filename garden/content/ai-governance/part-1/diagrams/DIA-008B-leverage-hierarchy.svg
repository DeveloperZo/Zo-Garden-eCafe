<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d8b-t d8b-d">
  <title id="d8b-t">DIA-008B. Where AI Governance Operates on the Leverage Scale</title>
  <desc id="d8b-d">Meadows' 12 leverage points mapped to current AI governance interventions. Points 12-10 (weakest leverage) at top; points 1-3 (strongest) at bottom. Color zones match the four tiers: gold (low), sage (medium), slate (high), deep rust (transformative). Most governance clusters at the top.</desc>
