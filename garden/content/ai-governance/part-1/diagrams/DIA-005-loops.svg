<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d5-t d5-d">
  <title id="d5-t">DIA-005 · When the loops meet</title>
  <desc id="d5-d">Stock-and-flow diagram. AI CAPABILITY is the central stock on a horizontal pipe between source and sink clouds. Training is a T-fitting on the inflow side. Deployment is a T-fitting on the outflow side. The stock has two info-link source ports on its bottom edge: a left-offset port emits R3 (forming, red) — AI capability beginning to feed back into its own training rate. A right-offset port emits the capability gap chain: capability gap node → investment and compute node → training rate. The deployment T-fitting emits an info-link to visible harm, which then chains both to investment and compute (forming R2, the inverted corrective loop where alarm raises spending) and to oversight and response (forming B2, drawn literally broken with hash marks at midpoint to mark a brake too slow to bind).</desc>
  <defs>
    <style>
      :root {
        --bg: #FAFAF8; --paper: #F2EEE3; --cloud: #FFFDF8; --cloud-shadow: #E2DFD6;
        --text: #2A2A35; --muted: #6B6873; --muted2: #9D9A95; --line: #E2DFD6;
        --flow: #B8AD95; --flow-dark: #8E846F;
        --rust: #A85B49; --rust-soft: #EDD8CE; --rust-deep: #823F30;
        --sage: #5A8270; --sage-soft: #DEE8E1;
        --broken: #B83A2A;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23; --paper: #1E2128; --cloud: #2B2722; --cloud-shadow: #3A342C;
          --text: #E8E5DC; --muted: #B8B5AD; --muted2: #908D87; --line: #3E3D38;
          --flow: #8E846F; --flow-dark: #B8AD95;
          --rust: #D29183; --rust-soft: #3D2925; --rust-deep: #E3A292;
          --sage: #92BAA6; --sage-soft: #233029;
          --broken: #FF8C73;
        }
      }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      [fill="#FAFAF8"] { fill: var(--bg); } [fill="#F2EEE3"] { fill: var(--paper); }
      [fill="#FFFDF8"] { fill: var(--cloud); } [fill="#E2DFD6"] { fill: var(--cloud-shadow); }
      [fill="#2A2A35"] { fill: var(--text); } [stroke="#2A2A35"] { stroke: var(--text); }
      [fill="#6B6873"] { fill: var(--muted); }
      [fill="#9D9A95"] { fill: var(--muted2); } [stroke="#9D9A95"] { stroke: var(--muted2); }
      [fill="#B8AD95"] { fill: var(--flow); } [stroke="#B8AD95"] { stroke: var(--flow); }
      [fill="#8E846F"] { fill: var(--flow-dark); }
      [fill="#A85B49"] { fill: var(--rust); } [stroke="#A85B49"] { stroke: var(--rust); }
      [fill="#EDD8CE"] { fill: var(--rust-soft); }
      [fill="#823F30"] { fill: var(--rust-deep); } [stroke="#823F30"] { stroke: var(--rust-deep); }
      [fill="#5A8270"] { fill: var(--sage); } [stroke="#5A8270"] { stroke: var(--sage); }
      [fill="#DEE8E1"] { fill: var(--sage-soft); }
      [stroke="#B83A2A"] { stroke: var(--broken); } [fill="#B83A2A"] { fill: var(--broken); }
    </style>
    <marker id="d5-flow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="5.5" markerHeight="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8E846F"/>
    </marker>
    <marker id="d5-info" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#2A2A35"/>
    </marker>
    <marker id="d5-info-faded" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#9D9A95"/>
    </marker>
    <marker id="d5-info-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#A85B49"/>
    </marker>
    <marker id="d5-info-r2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#823F30"/>
    </marker>
    <marker id="d5-info-sage" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#5A8270"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="540" fill="#F2EEE3"/>

  <!-- HEADER -->
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#A85B49" letter-spacing="0.04em">DIA-005 · WHEN THE LOOPS MEET</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#6B6873">a forming reinforcing loop, an inverted balancing loop, and a weak brake — sharing one stock</text>

  <!-- ─────────── MAIN PIPE ─────────── -->

  <!-- Source cloud (left) -->
  <path d="M 34 156 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#E2DFD6" opacity="0.65"/>
  <path d="M 30 152 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#FFFDF8" stroke="#2A2A35" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="70" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6873" class="serif">data · chips · talent</text>

  <!-- Pipe: source → training T -->
  <line x1="105" y1="155" x2="158" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt"/>

  <!-- Training T-fitting -->
  <g stroke="#2A2A35" stroke-linecap="butt">
    <line x1="160" y1="155" x2="200" y2="155" stroke-width="12.5"/>
    <line x1="180" y1="155" x2="180" y2="180" stroke-width="12.5"/>
  </g>
  <text x="180" y="105" text-anchor="middle" font-size="14" font-style="italic" fill="#2A2A35" class="serif">training</text>

  <!-- Pipe: training T → stock -->
  <line x1="200" y1="155" x2="258" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt" marker-end="url(#d5-flow)"/>

  <!-- STOCK: AI CAPABILITY -->
  <rect x="258" y="118" width="200" height="74" fill="#FFFDF8" stroke="#2A2A35" stroke-width="1.75"/>
  <text x="358" y="148" text-anchor="middle" font-size="14.5" fill="#2A2A35" class="serif">AI</text>
  <text x="358" y="168" text-anchor="middle" font-size="14.5" fill="#2A2A35" class="serif">capability</text>

  <!-- Pipe: stock → deployment T -->
  <line x1="458" y1="155" x2="518" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt"/>

  <!-- Deployment T-fitting -->
  <g stroke="#2A2A35" stroke-linecap="butt">
    <line x1="520" y1="155" x2="560" y2="155" stroke-width="12.5"/>
    <line x1="540" y1="155" x2="540" y2="180" stroke-width="12.5"/>
  </g>
  <text x="540" y="105" text-anchor="middle" font-size="14" font-style="italic" fill="#2A2A35" class="serif">deployment</text>

  <!-- Pipe: deployment T → sink cloud -->
  <line x1="560" y1="155" x2="618" y2="155" stroke="#B8AD95" stroke-width="14" stroke-linecap="butt" marker-end="url(#d5-flow)"/>

  <!-- Sink cloud (right) -->
  <path d="M 628 156 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#E2DFD6" opacity="0.65"/>
  <path d="M 624 152 q 0 -16 16 -18 q 4 -14 22 -10 q 8 -12 24 -6 q 14 -2 16 14 q 14 4 8 20 q 6 14 -10 16 q -8 12 -24 6 q -14 8 -28 -2 q -16 4 -24 -8 q -10 -2 0 -12 z" fill="#FFFDF8" stroke="#2A2A35" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="660" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6873" class="serif">products · users</text>

  <!-- ─────────── INFO-LINK SOURCE PORTS ─────────── -->
  <!-- Stock bottom port A — LEFT-offset (origin of R3) -->
  <circle cx="320" cy="192" r="3.5" fill="#F2EEE3" stroke="#A85B49" stroke-width="1.6"/>
  <!-- Stock bottom port B — RIGHT-offset (origin of capability gap chain) -->
  <circle cx="400" cy="192" r="3.5" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.5"/>
  <!-- Training T-fitting bottom port (inflow target for R3 + investment chain) -->
  <circle cx="180" cy="183" r="3.2" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.25"/>
  <!-- Deployment T-fitting bottom port (origin of harm chain) -->
  <circle cx="540" cy="183" r="3.2" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.25"/>

  <!-- ─────────── AUXILIARY NODES ─────────── -->

  <!-- Capability gap -->
  <circle cx="320" cy="290" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="328" y="294" font-size="13" fill="#2A2A35" class="serif">capability gap</text>

  <!-- Investment & compute -->
  <circle cx="135" cy="335" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="143" y="332" font-size="13" fill="#2A2A35" class="serif">investment</text>
  <text x="143" y="346" font-size="13" fill="#2A2A35" class="serif">&amp; compute</text>

  <!-- Visible harm — with concrete modes (sub-lines under the node, right-anchored to stay clear of capability gap) -->
  <circle cx="595" cy="290" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="603" y="294" font-size="13" fill="#2A2A35" class="serif">visible harm</text>
  <text x="603" y="308" font-size="9.5" font-style="italic" fill="#6B6873" class="serif">bias · errors · layoffs</text>

  <!-- Oversight & response (moved up for spacing) -->
  <circle cx="440" cy="360" r="4" fill="#F2EEE3" stroke="#2A2A35" stroke-width="1.6"/>
  <text x="448" y="357" font-size="13" fill="#2A2A35" class="serif">oversight</text>
  <text x="448" y="371" font-size="13" fill="#2A2A35" class="serif">&amp; response</text>

  <!-- ─────────── INFO LINKS ─────────── -->

  <!-- 1. R3 (red, forming) — stock left-port → training T port -->
  <path d="M 320 195 C 290 230, 220 215, 184 184" stroke="#A85B49" stroke-width="1.7" fill="none" marker-end="url(#d5-info-r)"/>

  <!-- 2. Stock → capability gap (right port → capability gap) -->
  <path d="M 400 195 C 390 235, 360 270, 322 287" stroke="#2A2A35" stroke-width="1.25" fill="none" marker-end="url(#d5-info)"/>

  <!-- 3. Capability gap → investment & compute -->
  <path d="M 318 292 Q 230 315 138 333" stroke="#2A2A35" stroke-width="1.25" fill="none" marker-end="url(#d5-info)"/>

  <!-- 4. Investment & compute → training T port -->
  <path d="M 132 333 C 105 250, 145 195, 178 184" stroke="#2A2A35" stroke-width="1.25" fill="none" marker-end="url(#d5-info)"/>

  <!-- 5. Deployment T port → visible harm -->
  <path d="M 540 184 Q 575 235 593 287" stroke="#2A2A35" stroke-width="1.25" fill="none" marker-end="url(#d5-info)"/>

  <!-- 6. Visible harm → investment & compute (R2 INVERSION, deeper rust) -->
  <path d="M 593 292 C 510 460, 250 470, 138 338" stroke="#823F30" stroke-width="1.7" fill="none" marker-end="url(#d5-info-r2)"/>

  <!-- 7. Visible harm → oversight & response (L4, weak — thin dotted sage, no break) -->
  <path d="M 593 293 C 540 320, 490 350, 444 358" stroke="#5A8270" stroke-width="1.2" fill="none" stroke-dasharray="2,3" opacity="0.7" marker-end="url(#d5-info-sage)"/>

  <!-- 8. Oversight & response → investment & compute (L4 closing leg — weak intended brake on funding) -->
  <path d="M 436 360 C 320 380, 200 380, 138 339" stroke="#5A8270" stroke-width="1.2" fill="none" stroke-dasharray="2,3" opacity="0.7" marker-end="url(#d5-info-sage)"/>

  <!-- ─────────── SHIFTING-THE-BURDEN ANNOTATION ─────────── -->
  <line x1="40" y1="500" x2="680" y2="500" stroke="#E2DFD6" stroke-width="1"/>
  <text x="360" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#6B6873" letter-spacing="0.06em">SHIFTING THE BURDEN</text>
  <text x="360" y="535" text-anchor="middle" font-size="11" fill="#6B6873">Visible safety absorbs the reform pressure that would push toward liability law and audits.</text>
</svg>
