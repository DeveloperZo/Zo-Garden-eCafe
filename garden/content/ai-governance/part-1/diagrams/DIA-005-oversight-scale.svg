<svg viewBox="0 0 900 502" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="viz-oversight-title viz-oversight-desc">
  <title id="viz-oversight-title">Industry dollars vs oversight and enforcement dollars</title>
  <desc id="viz-oversight-desc">Top chart uses a mirrored horizontal axis in billions of dollars with zero at the centre and a maximum of one point four trillion dollars each direction. Red bars extend left for hyperscaler capital expenditure about four hundred forty eight billion, committed infrastructure about one trillion, and OpenAI valuation about eight hundred fifty two billion. Blue markers on the right show United States AI Safety Institute funding about ten million, United Kingdom institute budget about eighty four million dollars equivalent, and global AI fines about four hundred thousand; small amounts use callouts because they are invisible at the trillion scale. A second chart below uses the same centre-zero layout zoomed to a maximum of one hundred million dollars on each side so United Kingdom and United States institute budgets appear as proportional blue bars and fines as a very small bar.</desc>

  <defs>
    <style>text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }</style>
  </defs>

  <!-- ========== PANEL A · $1.4T scale (geometry matches DIA-003) ========== -->
  <text x="450" y="22" font-size="13" font-weight="800" fill="#1C1C2E" text-anchor="middle">Scale: Industry investment (left) vs oversight / enforcement (right)</text>
  <text x="450" y="38" font-size="9.5" fill="#6B6B85" text-anchor="middle">Panel A · Same dollar scale both directions · $0 at centre · max bar = $1.4T</text>

  <line x1="450" y1="48" x2="450" y2="242" stroke="#1C1C2E" stroke-width="2"/>
  <text x="450" y="46" font-size="10" font-weight="700" fill="#1C1C2E" text-anchor="middle">$0</text>

  <rect x="0" y="56" width="900" height="44" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="104" width="900" height="44" fill="#FFFFFF"/>
  <rect x="0" y="152" width="900" height="44" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="200" width="900" height="44" fill="#FFFFFF"/>

  <!--
    Panel A: 250 px = $1,400B · centre x = 450 · left x = 450 − (B/1400)×250
    Row centres: 78, 126, 174, 222
  -->

  <!-- ROW A1 · $448B | US AISI ~$10M (invisible at this scale) -->
  <text x="194" y="78" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">Hyperscaler capex 2025</text>
  <rect x="370" y="61" width="80" height="34" rx="4" fill="#FDE8E3" stroke="#C94B2E" stroke-width="1.5"/>
  <text x="364" y="78" font-size="10.5" font-weight="700" fill="#C94B2E" text-anchor="end" dominant-baseline="middle">$448B</text>
  <line x1="450" y1="78" x2="457" y2="78" stroke="#6B6B85" stroke-width="4" stroke-linecap="round"/>
  <rect x="464" y="67" width="120" height="22" rx="4" fill="#F0EFF0" stroke="#6B6B85" stroke-width="1"/>
  <text x="524" y="78" font-size="9.5" font-weight="700" fill="#6B6B85" text-anchor="middle" dominant-baseline="middle">~$10M FY24</text>
  <text x="682" y="78" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="start" dominant-baseline="middle">US AISI → CAISI</text>

  <!-- ROW A2 · $1,000B committed infra | UK AISI £66M ≈ ~$84M USD -->
  <text x="194" y="126" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">Committed infrastructure</text>
  <rect x="271" y="109" width="179" height="34" rx="4" fill="#FDE8E3" stroke="#C94B2E" stroke-width="1.5"/>
  <text x="279" y="126" font-size="10.5" font-weight="700" fill="#C94B2E" text-anchor="start" dominant-baseline="middle">$1.0T</text>
  <line x1="450" y1="126" x2="457" y2="126" stroke="#6B6B85" stroke-width="4" stroke-linecap="round"/>
  <rect x="464" y="115" width="128" height="22" rx="4" fill="#F0EFF0" stroke="#6B6B85" stroke-width="1"/>
  <text x="528" y="126" font-size="9.5" font-weight="700" fill="#6B6B85" text-anchor="middle" dominant-baseline="middle">~$84M/yr</text>
  <text x="600" y="126" font-size="8" fill="#9B9BA8" dominant-baseline="middle">(≈£66M)</text>
  <text x="682" y="126" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="start" dominant-baseline="middle">UK AI Security Institute</text>

  <!-- ROW A3 · $852B valuation | note -->
  <text x="194" y="174" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">OpenAI valuation (Oct 2025)</text>
  <rect x="298" y="157" width="152" height="34" rx="4" fill="#FDE8E3" stroke="#C94B2E" stroke-width="1.5"/>
  <text x="306" y="174" font-size="10.5" font-weight="700" fill="#C94B2E" text-anchor="start" dominant-baseline="middle">$852B</text>
  <text x="520" y="174" font-size="9" fill="#9B9BA8" font-style="italic" text-anchor="start" dominant-baseline="middle">Oversight $ not visible →</text>

  <!-- ROW A4 · Global fines ~$400K (DIA-003-style; no left bar) -->
  <line x1="450" y1="222" x2="457" y2="222" stroke="#6B6B85" stroke-width="4" stroke-linecap="round"/>
  <rect x="464" y="211" width="84" height="22" rx="4" fill="#F0EFF0" stroke="#6B6B85" stroke-width="1"/>
  <text x="506" y="222" font-size="10" font-weight="700" fill="#6B6B85" text-anchor="middle" dominant-baseline="middle">~$400K</text>
  <text x="554" y="222" font-size="8.5" fill="#9B9BA8" dominant-baseline="middle">(not to scale)</text>
  <text x="682" y="222" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="start" dominant-baseline="middle">Global AI fines (cumulative)</text>

  <!-- Panel A axis -->
  <line x1="200" y1="252" x2="450" y2="252" stroke="#C94B2E" stroke-width="1.5" opacity="0.45"/>
  <line x1="450" y1="252" x2="700" y2="252" stroke="#3A5498" stroke-width="1.5" opacity="0.45"/>
  <g font-size="8.5" fill="#6B6B85" text-anchor="middle">
    <line x1="388" y1="248" x2="388" y2="256" stroke="#9B9BA8"/><text x="388" y="268">$350B</text>
    <line x1="325" y1="248" x2="325" y2="256" stroke="#9B9BA8"/><text x="325" y="268">$700B</text>
    <line x1="263" y1="248" x2="263" y2="256" stroke="#9B9BA8"/><text x="263" y="268">$1.05T</text>
    <line x1="200" y1="248" x2="200" y2="256" stroke="#9B9BA8"/><text x="200" y="268">$1.4T</text>
    <line x1="513" y1="248" x2="513" y2="256" stroke="#9B9BA8"/><text x="513" y="268">$350B</text>
    <line x1="575" y1="248" x2="575" y2="256" stroke="#9B9BA8"/><text x="575" y="268">$700B</text>
    <line x1="638" y1="248" x2="638" y2="256" stroke="#9B9BA8"/><text x="638" y="268">$1.05T</text>
    <line x1="700" y1="248" x2="700" y2="256" stroke="#9B9BA8"/><text x="700" y="268">$1.4T</text>
  </g>
  <text x="325" y="282" font-size="9" font-weight="700" fill="#C94B2E" text-anchor="middle">← Industry scale ($)</text>
  <text x="575" y="282" font-size="9" font-weight="700" fill="#3A5498" text-anchor="middle">Oversight &amp; fines ($) →</text>
  <text x="450" y="298" font-size="8.5" fill="#9B9BA8" text-anchor="middle">Right-side $10M–$100M marks are callouts: bar length is not proportional at this range</text>

  <!-- ========== PANEL B · Zoomed ±$100M (proportional bars) ========== -->
  <text x="450" y="322" font-size="12" font-weight="800" fill="#1C1C2E" text-anchor="middle">Zoom: oversight &amp; fines (same layout · linear · max = $100M each way)</text>
  <text x="450" y="338" font-size="9.5" fill="#6B6B85" text-anchor="middle">Panel B · £66M shown as ≈$84M USD for a single dollar axis · $400K uses a visual minimum width</text>

  <line x1="450" y1="348" x2="450" y2="463" stroke="#1C1C2E" stroke-width="2"/>
  <text x="450" y="346" font-size="10" font-weight="700" fill="#1C1C2E" text-anchor="middle">$0</text>

  <rect x="0" y="356" width="900" height="36" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="392" width="900" height="36" fill="#FFFFFF"/>
  <rect x="0" y="428" width="900" height="36" fill="#FAFAFA" opacity="0.6"/>

  <!-- 250 px = $100M · $84M→210px · $10M→25px · $400K→1px (8px min) -->
  <!-- ROW B1 · UK ~$84M -->
  <text x="194" y="374" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">Reference · $100M</text>
  <rect x="200" y="359" width="250" height="30" rx="4" fill="#FDE8E3" stroke="#C94B2E" stroke-width="1" opacity="0.35"/>
  <text x="325" y="374" font-size="9" font-weight="700" fill="#C94B2E" text-anchor="middle" dominant-baseline="middle">full width = $100M</text>
  <rect x="450" y="359" width="210" height="30" rx="4" fill="#E3E8F5" stroke="#3A5498" stroke-width="1.5"/>
  <text x="460" y="374" font-size="10.5" font-weight="700" fill="#3A5498" text-anchor="start" dominant-baseline="middle">~$84M/yr</text>
  <text x="682" y="374" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="start" dominant-baseline="middle">UK AI Security Institute (≈£66M)</text>

  <!-- ROW B2 · US ~$10M (bar from $0 at centre) -->
  <text x="194" y="410" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">US AISI → CAISI</text>
  <text x="430" y="410" font-size="9" fill="#9B9BA8" text-anchor="end" dominant-baseline="middle">FY24 ~$10M</text>
  <rect x="450" y="395" width="25" height="30" rx="3" fill="#E3E8F5" stroke="#3A5498" stroke-width="1.5"/>
  <text x="480" y="410" font-size="10.5" font-weight="700" fill="#3A5498" text-anchor="start" dominant-baseline="middle">~$10M</text>

  <!-- ROW B3 · Global fines ~$400K -->
  <text x="194" y="446" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">Global AI fines</text>
  <text x="430" y="446" font-size="9" fill="#9B9BA8" text-anchor="end" dominant-baseline="middle">cumulative</text>
  <rect x="450" y="431" width="8" height="30" rx="2" fill="#E3E8F5" stroke="#3A5498" stroke-width="1.5"/>
  <text x="464" y="446" font-size="10" font-weight="700" fill="#3A5498" text-anchor="start" dominant-baseline="middle">~$400K</text>
  <text x="548" y="446" font-size="8" fill="#9B9BA8" dominant-baseline="middle">(8px min · true length ≈1px)</text>

  <!-- Panel B axis ($100M max) -->
  <line x1="200" y1="468" x2="450" y2="468" stroke="#C94B2E" stroke-width="1.5" opacity="0.45"/>
  <line x1="450" y1="468" x2="700" y2="468" stroke="#3A5498" stroke-width="1.5" opacity="0.45"/>
  <g font-size="8.5" fill="#6B6B85" text-anchor="middle">
    <line x1="388" y1="464" x2="388" y2="472" stroke="#9B9BA8"/><text x="388" y="484">$25M</text>
    <line x1="325" y1="464" x2="325" y2="472" stroke="#9B9BA8"/><text x="325" y="484">$50M</text>
    <line x1="263" y1="464" x2="263" y2="472" stroke="#9B9BA8"/><text x="263" y="484">$75M</text>
    <line x1="200" y1="464" x2="200" y2="472" stroke="#9B9BA8"/><text x="200" y="484">$100M</text>
    <line x1="513" y1="464" x2="513" y2="472" stroke="#9B9BA8"/><text x="513" y="484">$25M</text>
    <line x1="575" y1="464" x2="575" y2="472" stroke="#9B9BA8"/><text x="575" y="484">$50M</text>
    <line x1="638" y1="464" x2="638" y2="472" stroke="#9B9BA8"/><text x="638" y="484">$75M</text>
    <line x1="700" y1="464" x2="700" y2="472" stroke="#9B9BA8"/><text x="700" y="484">$100M</text>
  </g>
  <text x="325" y="496" font-size="9" font-weight="700" fill="#C94B2E" text-anchor="middle">← Reference band</text>
  <text x="575" y="496" font-size="9" font-weight="700" fill="#3A5498" text-anchor="middle">Measured oversight $ →</text>

</svg>
