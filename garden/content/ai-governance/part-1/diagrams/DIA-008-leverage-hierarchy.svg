<svg viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d8-t d8-d">
  <title id="d8-t">DIA-008 — Where AI Governance Operates on the Leverage Scale</title>
  <desc id="d8-d">Meadows' 12 leverage points mapped to current AI governance interventions. Points 12–10 (weakest leverage) are at top; points 1–3 (strongest) at bottom. Most governance clusters at the top.</desc>
  <defs>
    <style>
      :root {
        --bg: #FAF6EE; --text: #1C1C2E; --muted: #6B6B85; --muted2: #9B9BA8; --line: #D0CCC4;
        --red: #C94B2E; --red-soft: #FDE8E3; --amber: #C9880A; --amber-soft: #FEF8E8;
        --blue: #3A5498; --blue-soft: #E3E8F5; --green: #2A7A5F; --green-soft: #EDF7F3; --gray-soft: #F7F6F3;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23; --text: #E8ECF5; --muted: #C2C9D9; --muted2: #A8B3C7; --line: #404756;
          --red: #FF8C73; --red-soft: #4A2A28; --amber: #F2BE5C; --amber-soft: #453A22;
          --blue: #8EACFF; --blue-soft: #2A3554; --green: #63C7A3; --green-soft: #243E36; --gray-soft: #2A2F3A;
        }
      }
      [fill="#FAF6EE"] { fill: var(--bg); } [fill="#1C1C2E"] { fill: var(--text); } [fill="#6B6B85"] { fill: var(--muted); } [fill="#9B9BA8"] { fill: var(--muted2); } [stroke="#9B9BA8"] { stroke: var(--muted2); }
      [stroke="#D0CCC4"] { stroke: var(--line); }
      [fill="#C94B2E"] { fill: var(--red); } [stroke="#C94B2E"] { stroke: var(--red); } [fill="#FDE8E3"] { fill: var(--red-soft); }
      [fill="#C9880A"] { fill: var(--amber); } [stroke="#C9880A"] { stroke: var(--amber); } [fill="#FEF8E8"] { fill: var(--amber-soft); }
      [fill="#3A5498"] { fill: var(--blue); } [stroke="#3A5498"] { stroke: var(--blue); } [fill="#E3E8F5"] { fill: var(--blue-soft); }
      [fill="#2A7A5F"] { fill: var(--green); } [stroke="#2A7A5F"] { stroke: var(--green); } [fill="#EDF7F3"] { fill: var(--green-soft); }
      [fill="#F7F6F3"] { fill: var(--gray-soft); }
    </style>
  </defs>

  <!-- Background -->
