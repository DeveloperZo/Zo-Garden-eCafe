  <!-- Title -->
  <text x="430" y="22" text-anchor="middle" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="-0.01em" fill="#1C1C2E">Where AI Governance Actually Operates on the Leverage Scale</text>
  <text x="430" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9.5" fill="#6B6B85">Weakest leverage at top, strongest at bottom. Most governance clusters where it matters least.</text>

