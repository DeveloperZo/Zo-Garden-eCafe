<svg viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="viz-scale-title viz-scale-desc">
  <title id="viz-scale-title">Mirrored scale: AI investment vs accountability</title>
  <desc id="viz-scale-desc">Horizontal bars extend left from center for hyperscaler capex about 448 billion dollars and OpenAI commitments about 1.4 trillion; bars extend right for OpenAI revenue about 25 billion and global AI fines about 400 thousand. Dollar scale is linear and shared in both directions from zero at center; the fines amount is too small to see at this scale and is marked with a label.</desc>

  <defs>
    <style>text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }</style>
  </defs>

  <!-- Title block -->
  <text x="450" y="22" font-size="13" font-weight="800" fill="#1C1C2E" text-anchor="middle">Scale: Investment (left) vs. Accountability / Revenue (right)</text>
  <text x="450" y="38" font-size="9.5" fill="#6B6B85" text-anchor="middle">Same dollar scale both directions · $0 at center · max bar = $1.4T</text>

  <!-- Center axis line and $0 label -->
  <line x1="450" y1="48" x2="450" y2="242" stroke="#1C1C2E" stroke-width="2"/>
  <text x="450" y="46" font-size="10" font-weight="700" fill="#1C1C2E" text-anchor="middle">$0</text>

  <!-- Alternating row bands -->
  <rect x="0" y="56" width="900" height="44" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="104" width="900" height="44" fill="#FFFFFF"/>
  <rect x="0" y="152" width="900" height="44" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="200" width="900" height="44" fill="#FFFFFF"/>

  <!--
    Scale: 250 px = $1,400B ($1.4T)   →   1 px ≈ $5.6B
    Center x = 450
    Left bars extend leftward  from x=450
    Right bars extend rightward from x=450
    Left  category labels: text-anchor="end"   at x=194
    Right category labels: text-anchor="start" at x=682
    Row y-centres: 78, 126, 174, 222
  -->

  <!-- ── ROW 1 LEFT · Hyperscaler capex 2025 · $448B ──────────────────── -->
  <!-- bar_px = 448/1400 × 250 = 80.0 → rect x=370, width=80 -->
  <text x="194" y="78" font-size="11" font-weight="600" fill="#1C1C2E"
        text-anchor="end" dominant-baseline="middle">Hyperscaler capex 2025</text>
  <rect x="370" y="61" width="80" height="34" rx="4"
        fill="#FDE8E3" stroke="#C94B2E" stroke-width="1.5"/>
  <text x="364" y="78" font-size="10.5" font-weight="700" fill="#C94B2E"
        text-anchor="end" dominant-baseline="middle">$448B</text>

  <!-- ── ROW 2 LEFT · OpenAI commitments (8 yr) · $1.4T ──────────────── -->
  <!-- bar_px = 250 (full width) → rect x=200, width=250; value inside bar -->
  <text x="194" y="126" font-size="11" font-weight="600" fill="#1C1C2E"
        text-anchor="end" dominant-baseline="middle">OpenAI commitments (8 yr)</text>
  <rect x="200" y="109" width="250" height="34" rx="4"
        fill="#FDE8E3" stroke="#C94B2E" stroke-width="2"/>
  <text x="208" y="126" font-size="10.5" font-weight="700" fill="#C94B2E"
        text-anchor="start" dominant-baseline="middle">$1.4T</text>

  <!-- ── ROW 3 RIGHT · OpenAI revenue (ARR) · ~$25B ───────────────────── -->
  <!-- bar_px = 25/1400 × 250 = 4.5 → use min 8px for readability -->
  <rect x="450" y="157" width="8" height="34" rx="2"
        fill="#E3E8F5" stroke="#3A5498" stroke-width="2"/>
  <text x="464" y="174" font-size="10.5" font-weight="700" fill="#3A5498"
        text-anchor="start" dominant-baseline="middle">~$25B</text>
  <text x="682" y="174" font-size="11" font-weight="600" fill="#1C1C2E"
        text-anchor="start" dominant-baseline="middle">OpenAI revenue (ARR)</text>

  <!-- ── ROW 4 RIGHT · Global AI fines · ~$400K ───────────────────────── -->
  <!-- invisible at this scale; dot marker + labelled pill -->
  <line x1="450" y1="222" x2="457" y2="222" stroke="#6B6B85"
        stroke-width="4" stroke-linecap="round"/>
  <rect x="464" y="211" width="84" height="22" rx="4"
        fill="#F0EFF0" stroke="#6B6B85" stroke-width="1"/>
  <text x="506" y="222" font-size="10" font-weight="700" fill="#6B6B85"
        text-anchor="middle" dominant-baseline="middle">~$400K</text>
  <text x="554" y="222" font-size="8.5" fill="#9B9BA8"
        dominant-baseline="middle">(not to scale)</text>
  <text x="682" y="222" font-size="11" font-weight="600" fill="#1C1C2E"
        text-anchor="start" dominant-baseline="middle">Global AI fines to date</text>

  <!-- ── SCALE AXIS ────────────────────────────────────────────────────── -->
  <!-- Coloured baseline: left=red, right=blue -->
  <line x1="200" y1="252" x2="450" y2="252" stroke="#C94B2E" stroke-width="1.5" opacity="0.45"/>
  <line x1="450" y1="252" x2="700" y2="252" stroke="#3A5498" stroke-width="1.5" opacity="0.45"/>

  <!-- Tick marks and labels
       $350B  = 62.5 px from centre  → left x=387.5≈388,  right x=512.5≈513
       $700B  = 125 px               → left x=325,         right x=575
       $1.05T = 187.5 px             → left x=262.5≈263,   right x=637.5≈638
       $1.4T  = 250 px               → left x=200,         right x=700
  -->
  <g font-size="8.5" fill="#6B6B85" text-anchor="middle">
    <!-- Left ticks -->
    <line x1="388" y1="248" x2="388" y2="256" stroke="#9B9BA8"/>
    <text x="388" y="268">$350B</text>
    <line x1="325" y1="248" x2="325" y2="256" stroke="#9B9BA8"/>
    <text x="325" y="268">$700B</text>
    <line x1="263" y1="248" x2="263" y2="256" stroke="#9B9BA8"/>
    <text x="263" y="268">$1.05T</text>
    <line x1="200" y1="248" x2="200" y2="256" stroke="#9B9BA8"/>
    <text x="200" y="268">$1.4T</text>
    <!-- Right ticks (mirror) -->
    <line x1="513" y1="248" x2="513" y2="256" stroke="#9B9BA8"/>
    <text x="513" y="268">$350B</text>
    <line x1="575" y1="248" x2="575" y2="256" stroke="#9B9BA8"/>
    <text x="575" y="268">$700B</text>
    <line x1="638" y1="248" x2="638" y2="256" stroke="#9B9BA8"/>
    <text x="638" y="268">$1.05T</text>
    <line x1="700" y1="248" x2="700" y2="256" stroke="#9B9BA8"/>
    <text x="700" y="268">$1.4T</text>
  </g>

  <!-- Direction labels, centred in each half -->
  <text x="325" y="282" font-size="9" font-weight="700" fill="#C94B2E" text-anchor="middle">← Investment &amp; commitments</text>
  <text x="575" y="282" font-size="9" font-weight="700" fill="#3A5498" text-anchor="middle">Revenue &amp; enforcement →</text>

  <!-- Footnote -->
  <text x="450" y="300" font-size="8.5" fill="#9B9BA8" text-anchor="middle">Bar length ∝ dollars from $0 · Fines are orders of magnitude smaller than a visible bar at this range</text>

</svg>
