<svg viewBox="0 0 860 525" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d5-t d5-d">
  <title id="d5-t">DIA-004A · Industry capital vs oversight capacity</title>
  <desc id="d5-d">Horizontal bar chart on a single scale of $1.4 trillion. Industry bars — hyperscaler capex $448B, OpenAI commitments (8 year) $1.4T, OpenAI valuation $852B — extend hundreds of pixels. The oversight rows show less than one pixel at this scale. A circle marks the oversight region and expanding connector lines lead to a zoomed inset panel showing UK AISI $84M, US CAISI $10M, and global AI fines ~$400K at their own proportional scale.</desc>
  <defs>
    <style>
      :root {
        --bg: #F2EEE3; --bg-alt: #F5F1E8; --surface-a: #F0F3FA; --surface-b: #F5F7FD; --surface-c: #EEF2FA;
        --panel: #FFFFFF; --text-main: #1C1C2E; --text: #3A3A4A; --muted: #6B6873; --muted2: #9D9A95; --line: #E2DFD6;
        --red: #A85B49; --red-soft: #EDD8CE; --blue: #4F627F; --blue-soft: #DEE3EC;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23; --bg-alt: #241E22; --surface-a: #232A3A; --surface-b: #202A3D; --surface-c: #26324A;
          --panel: #1C2029; --text-main: #E8ECF5; --text: #D6DEEE; --muted: #C2C9D9; --muted2: #A8B3C7; --line: #404756;
          --red: #FF8C73; --red-soft: #4A2A28; --blue: #8EACFF; --blue-soft: #2A3554;
        }
      }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      [fill="#F2EEE3"] { fill: var(--bg); } [fill="#F5F1E8"] { fill: var(--bg-alt); } [fill="#F0F3FA"] { fill: var(--surface-a); } [fill="#F5F7FD"] { fill: var(--surface-b); } [fill="#EEF2FA"] { fill: var(--surface-c); } [fill="#FFFFFF"] { fill: var(--panel); } [fill="#1C1C2E"] { fill: var(--text-main); }
      [fill="#3A3A4A"] { fill: var(--text); } [fill="#6B6873"] { fill: var(--muted); } [fill="#9D9A95"] { fill: var(--muted2); }
      [stroke="#9D9A95"] { stroke: var(--muted2); } [stroke="#E2DFD6"] { stroke: var(--line); }
      [fill="#A85B49"] { fill: var(--red); } [stroke="#A85B49"] { stroke: var(--red); } [fill="#EDD8CE"] { fill: var(--red-soft); }
      [fill="#4F627F"] { fill: var(--blue); } [stroke="#4F627F"] { stroke: var(--blue); } [fill="#DEE3EC"] { fill: var(--blue-soft); }
    </style>
  </defs>

  <rect width="860" height="525" fill="#F2EEE3" rx="8"/>

  <!-- ── STANDARD HEADER ── -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#A85B49" letter-spacing="0.04em">DIA-004A · INDUSTRY CAPITAL vs OVERSIGHT CAPACITY</text>
  <text x="430" y="48" text-anchor="middle" font-size="12" fill="#6B6873">same dollar scale · all bars start at $0 · max bar = $1.4T</text>

  <!-- ── INDUSTRY section ── -->
  <text x="185" y="80" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A85B49" letter-spacing="1.5">INDUSTRY</text>

  <!-- Row 1: Hyperscaler capex $448B → 448/1400 × 660 = 211px -->
  <rect x="0"   y="75" width="860" height="36" fill="#F5F1E8"/>
  <text x="178" y="93" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#3A3A4A">Hyperscaler capex 2025</text>
  <rect x="185" y="79" width="211" height="28" fill="#EDD8CE" stroke="#A85B49" stroke-width="1.5" rx="3"/>
  <text x="401" y="93" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#A85B49">  $448B</text>

  <!-- Row 2: OpenAI commitments (8 yr) $1.4T → 660px -->
  <rect x="0"   y="115" width="860" height="36" fill="#F2EEE3"/>
  <text x="178" y="133" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#3A3A4A">OpenAI commitments (8-year)</text>
  <rect x="185" y="119" width="660" height="28" fill="#EDD8CE" stroke="#A85B49" stroke-width="1.5" rx="3"/>
  <text x="836" y="133" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#A85B49">$1.4T</text>

  <!-- Row 3: OpenAI valuation $852B → 402px -->
  <rect x="0"   y="155" width="860" height="36" fill="#F5F1E8"/>
  <text x="178" y="173" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#3A3A4A">OpenAI valuation (Oct 2025)</text>
  <rect x="185" y="159" width="402" height="28" fill="#EDD8CE" stroke="#A85B49" stroke-width="1.5" rx="3"/>
  <text x="591" y="173" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#A85B49">  $852B</text>

  <!-- ── Divider ── -->
  <line x1="0" y1="199" x2="860" y2="199" stroke="#E2DFD6" stroke-width="1.5"/>

  <!-- ── OVERSIGHT section ── -->
  <text x="185" y="214" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#4F627F" letter-spacing="1.5">OVERSIGHT &amp; ENFORCEMENT</text>

  <!-- Row 4: US CAISI $10M — 0.005px at scale -->
  <rect x="0"   y="219" width="860" height="28" fill="#F0F3FA"/>
  <text x="178" y="233" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#3A3A4A">US CAISI (FY24)</text>
  <rect x="185" y="223" width="4" height="20" fill="#4F627F" rx="1"/>
  <text x="194" y="233" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#4F627F">$10M</text>
  <text x="242" y="233" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-style="italic" fill="#9D9A95">— less than 1 pixel at this scale</text>

  <!-- Row 5: UK AISI $84M — 0.04px at scale -->
  <rect x="0"   y="251" width="860" height="28" fill="#F5F7FD"/>
  <text x="178" y="265" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#3A3A4A">UK AI Security Institute</text>
  <rect x="185" y="255" width="4" height="20" fill="#4F627F" rx="1"/>
  <text x="194" y="265" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#4F627F">$84M / yr</text>
  <text x="262" y="265" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-style="italic" fill="#9D9A95">— less than 1 pixel at this scale</text>

  <!-- Row 6: Global AI fines ~$400K -->
  <rect x="0"   y="283" width="860" height="28" fill="#F0F3FA"/>
  <text x="178" y="297" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#3A3A4A">Global AI fines (all time)</text>
  <rect x="185" y="287" width="4" height="20" fill="#4F627F" rx="1"/>
  <text x="194" y="297" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#4F627F">~$400K</text>
  <text x="256" y="297" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-style="italic" fill="#9D9A95">— less than 1 pixel at this scale</text>

  <!-- ── Main axis ── -->
  <line x1="185" y1="320" x2="845" y2="320" stroke="#9D9A95" stroke-width="1"/>
  <g font-family="system-ui,sans-serif" font-size="8.5" fill="#9D9A95" text-anchor="middle">
    <line x1="185" y1="316" x2="185" y2="324" stroke="#9D9A95"/>
    <text x="185" y="334">$0</text>
    <line x1="350" y1="316" x2="350" y2="324" stroke="#9D9A95"/>
    <text x="350" y="334">$350B</text>
    <line x1="515" y1="316" x2="515" y2="324" stroke="#9D9A95"/>
    <text x="515" y="334">$700B</text>
    <line x1="680" y1="316" x2="680" y2="324" stroke="#9D9A95"/>
    <text x="680" y="334">$1.05T</text>
    <line x1="845" y1="316" x2="845" y2="324" stroke="#9D9A95"/>
    <text x="845" y="334">$1.4T</text>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ZOOM VISUAL CONNECTOR                                    -->
  <!-- Circle marks oversight region; lines expand to inset    -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Connector lines — drawn before zoom panel so they sit behind it -->
  <!-- Left:  bottom-left of circle → top-left corner of zoom panel  -->
  <!-- Right: right side of circle  → top-right corner of zoom panel -->
  <line x1="172" y1="298" x2="115" y2="372" stroke="#9D9A95" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="258" y1="280" x2="745" y2="372" stroke="#9D9A95" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- ── Zoom inset panel ── -->
  <!-- Scale: $100M = 560px, bars from x=185 to x=745 -->
  <rect x="50" y="372" width="720" height="110" fill="#FFFFFF" stroke="#4F627F" stroke-width="1.5" rx="6"/>
  <text x="122" y="384" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" fill="#4F627F" letter-spacing="0.8">ZOOMED OVERSIGHT SCALE ($100M max)</text>

  <!-- UK $84M: 84 × 5.6 = 470px, end x=655 -->
  <rect x="115" y="389" width="630" height="21" fill="#F5F7FD"/>
  <text x="108" y="400" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="600" fill="#3A3A4A">UK AISI</text>
  <rect x="185" y="392" width="470" height="15" fill="#DEE3EC" stroke="#4F627F" stroke-width="1.5" rx="3"/>
  <text x="659" y="400" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="700" fill="#4F627F">  $84M / yr</text>

  <!-- US $10M: 10 × 5.6 = 56px, end x=241 -->
  <rect x="115" y="413" width="630" height="21" fill="#FFFFFF"/>
  <text x="108" y="424" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="600" fill="#3A3A4A">US CAISI</text>
  <rect x="185" y="416" width="56"  height="15" fill="#DEE3EC" stroke="#4F627F" stroke-width="1.5" rx="3"/>
  <text x="245" y="424" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="700" fill="#4F627F">  $10M</text>

  <!-- Fines $0.4M: 4px forced min -->
  <rect x="115" y="437" width="630" height="21" fill="#F5F7FD"/>
  <text x="108" y="448" text-anchor="end" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="600" fill="#3A3A4A">Global fines</text>
  <rect x="185" y="440" width="4"   height="15" fill="#4F627F" rx="1"/>
  <text x="194" y="448" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="700" fill="#4F627F">~$400K</text>
  <text x="252" y="448" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="8.5" font-style="italic" fill="#9D9A95">(4px min · true width 0.02px at $100M scale)</text>

  <!-- Zoom axis -->
  <line x1="185" y1="461" x2="745" y2="461" stroke="#9D9A95" stroke-width="1"/>
  <g font-family="system-ui,sans-serif" font-size="8.5" fill="#9D9A95" text-anchor="middle">
    <line x1="185" y1="457" x2="185" y2="465" stroke="#9D9A95"/>
    <text x="185" y="476">$0</text>
    <line x1="325" y1="457" x2="325" y2="465" stroke="#9D9A95"/>
    <text x="325" y="476">$25M</text>
    <line x1="465" y1="457" x2="465" y2="465" stroke="#9D9A95"/>
    <text x="465" y="476">$50M</text>
    <line x1="605" y1="457" x2="605" y2="465" stroke="#9D9A95"/>
    <text x="605" y="476">$75M</text>
    <line x1="745" y1="457" x2="745" y2="465" stroke="#9D9A95"/>
    <text x="745" y="476">$100M</text>
  </g>

  <!-- ── Circle — drawn last, sits on top of main chart ── -->
  <!-- Encompasses all three oversight rows (y=207–299) -->
  <circle cx="215" cy="265" r="46" fill="#DEE3EC" fill-opacity="0.25" stroke="#4F627F" stroke-width="1.75"/>

  <rect x="24" y="479" width="812" height="39" rx="6" fill="#FFFFFF" opacity="0.68"/>
  <text x="36" y="495" font-size="10.5" font-style="italic" fill="#6B6873">On the same $1.4T axis, oversight resources are effectively invisible while industry deployment capital extends across hundreds of pixels.</text>
  <text x="36" y="509" font-size="10.5" font-style="italic" fill="#6B6873">The inset is required just to compare US CAISI ($10M), UK AISI ($84M), and cumulative global AI fines (~$400K) at human-readable width.</text>
</svg>
