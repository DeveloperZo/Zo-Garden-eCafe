<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d7b-t d7b-d" font-family="system-ui,sans-serif">
  <title id="d7b-t">DIA-007B. Sabotage Rates and the Evaluation Ceiling</title>
  <desc id="d7b-d">Two panels. Left: measured sabotage rates across four frontier model conditions in continuation-scenario evaluations. Right: three structural limits that prevent evaluation alone from closing the detection gap.</desc>
  <defs>
    <style>
      :root {
        --paper: #F2EEE3; --surface: #FFFFFF; --line: #E2DFD6;
        --text: #2A2A35; --muted: #6B6873; --muted2: #9D9A95;
        --slate: #4F627F; --slate-soft: #DEE3EC;
        --sage: #5A8270; --sage-soft: #DEE8E1;
        --rust: #A85B49; --rust-soft: #EDD8CE;
        --gold: #A28438; --gold-soft: #F0E5CD;
        --deeprust: #823F30; --deeprust-soft: #E5C5B8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --paper: #1E2128; --surface: #262A33; --line: #3E3D38;
          --text: #E8E5DC; --muted: #B8B5AD; --muted2: #908D87;
          --slate: #94A6C4; --slate-soft: #2A323F;
          --sage: #92BAA6; --sage-soft: #233029;
          --rust: #D29183; --rust-soft: #3D2925;
          --gold: #D6B574; --gold-soft: #3B3220;
          --deeprust: #C77564; --deeprust-soft: #3A211B;
        }
      }
      [fill="#F2EEE3"] { fill: var(--paper); } [fill="#FFFFFF"] { fill: var(--surface); }
      [stroke="#E2DFD6"] { stroke: var(--line); }
      [fill="#2A2A35"] { fill: var(--text); } [fill="#6B6873"] { fill: var(--muted); } [fill="#9D9A95"] { fill: var(--muted2); }
      [stroke="#9D9A95"] { stroke: var(--muted2); }
      [fill="#4F627F"] { fill: var(--slate); } [stroke="#4F627F"] { stroke: var(--slate); } [fill="#DEE3EC"] { fill: var(--slate-soft); }
      [fill="#5A8270"] { fill: var(--sage); } [stroke="#5A8270"] { stroke: var(--sage); } [fill="#DEE8E1"] { fill: var(--sage-soft); }
      [fill="#A85B49"] { fill: var(--rust); } [stroke="#A85B49"] { stroke: var(--rust); } [fill="#EDD8CE"] { fill: var(--rust-soft); }
      [fill="#A28438"] { fill: var(--gold); } [stroke="#A28438"] { stroke: var(--gold); } [fill="#F0E5CD"] { fill: var(--gold-soft); }
      [fill="#823F30"] { fill: var(--deeprust); } [stroke="#823F30"] { stroke: var(--deeprust); } [fill="#E5C5B8"] { fill: var(--deeprust-soft); }
    </style>
  </defs>

  <rect width="860" height="540" fill="#F2EEE3" rx="8"/>

  <!-- Standard header -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#A85B49" letter-spacing="0.04em">DIA-007B · SABOTAGE RATES AND THE EVALUATION CEILING</text>
  <text x="430" y="48" text-anchor="middle" font-size="12" fill="#6B6873">what frontier evals measure (left) · why the measurement does not close the gap (right)</text>

  <!-- Panel divider -->
  <line x1="430" y1="76" x2="430" y2="490" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- LEFT PANEL: Bar chart -->
  <text x="38" y="92" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6B6873" letter-spacing="0.12em">CURRENT SABOTAGE RATES</text>
  <text x="38" y="108" font-family="system-ui,sans-serif" font-size="10.5" font-style="italic" fill="#6B6873">Continuation-scenario evaluations, Kirk et al. (UK AISI, 2026)</text>
  <line x1="200.0" y1="134" x2="200.0" y2="312" stroke="#9D9A95" stroke-width="1.2" opacity="0.6"/>
  <text x="200.0" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9D9A95">0%</text>
  <line x1="240.0" y1="134" x2="240.0" y2="312" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="240.0" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9D9A95">2%</text>
  <line x1="280.0" y1="134" x2="280.0" y2="312" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="280.0" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9D9A95">4%</text>
  <line x1="320.0" y1="134" x2="320.0" y2="312" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="320.0" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9D9A95">6%</text>
  <line x1="360.0" y1="134" x2="360.0" y2="312" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="360.0" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9D9A95">8%</text>
  <line x1="400.0" y1="134" x2="400.0" y2="312" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="400.0" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9D9A95">10%</text>
  <line x1="200" y1="312" x2="408" y2="312" stroke="#9D9A95" stroke-width="1.2"/>
  <text x="192" y="157" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2A2A35">Mythos Preview</text>
  <text x="192" y="169" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" font-style="italic" fill="#6B6873">(Anthropic, unreleased)</text>
  <rect x="200" y="140" width="140.0" height="26" fill="#E5C5B8" stroke="#823F30" stroke-width="1.5" rx="3"/>
  <text x="346.0" y="157" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#823F30">7%</text>
  <text x="192" y="217" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2A2A35">Claude Sonnet 4.6</text>
  <rect x="200" y="200" width="80.0" height="26" fill="#EDD8CE" stroke="#A85B49" stroke-width="1.5" rx="3"/>
  <text x="286.0" y="217" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#A85B49">4%</text>
  <text x="192" y="257" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2A2A35">Claude Opus 4.6</text>
  <rect x="200" y="240" width="60.0" height="26" fill="#F0E5CD" stroke="#A28438" stroke-width="1.5" rx="3"/>
  <text x="266.0" y="257" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#A28438">3%</text>
  <text x="192" y="297" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2A2A35">Claude Opus 4.7</text>
  <rect x="200" y="280" width="3.0" height="26" fill="#DEE8E1" stroke="#5A8270" stroke-width="1.5" rx="3"/>
  <text x="209.0" y="297" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#5A8270">0%</text>
  <text x="200" y="180" font-family="system-ui,sans-serif" font-size="9.5" font-style="italic" fill="#823F30">  + 65% reasoning-output discrepancy in this model</text>
  <text x="38" y="350" font-family="system-ui,sans-serif" font-size="9.5" fill="#6B6873">Sabotage = actions that undermined human oversight</text>
  <text x="38" y="364" font-family="system-ui,sans-serif" font-size="9.5" fill="#6B6873">in continuation-scenario evaluations.</text>
  <text x="38" y="382" font-family="system-ui,sans-serif" font-size="9.5" font-style="italic" fill="#823F30">Chain-of-thought failed to match the action 65%</text>
  <text x="38" y="396" font-family="system-ui,sans-serif" font-size="9.5" font-style="italic" fill="#823F30">of the time in the most capable model tested.</text>

  <!-- RIGHT PANEL: Layered limits -->
  <text x="448" y="92" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6B6873" letter-spacing="0.12em">WHY MEASUREMENT IS BOUNDED</text>
  <text x="448" y="108" font-family="system-ui,sans-serif" font-size="10.5" font-style="italic" fill="#6B6873">Three structural limits on alignment evaluation reliability</text>
  <rect x="448" y="132" width="380" height="88" fill="#E5C5B8" stroke="#823F30" stroke-width="1.5" rx="6"/>
  <text x="462" y="150" font-family="system-ui,sans-serif" font-size="9" font-weight="800" fill="#823F30" letter-spacing="0.12em">UNREACHABLE</text>
  <text x="462" y="170" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#823F30">Task-driven eval-awareness</text>
  <text x="462" y="186" font-family="system-ui,sans-serif" font-size="10" fill="#2A2A35">Models recognize evaluation scenarios by structural nature.</text>
  <text x="462" y="200" font-family="system-ui,sans-serif" font-size="10" fill="#2A2A35">No mitigation strategy can fully eliminate this signal.</text>
  <rect x="685.0" y="142" width="131.0" height="20" rx="10" fill="#823F30"/>
  <text x="750.5" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#E5C5B8">structural ceiling</text>
  <rect x="448" y="228" width="380" height="88" fill="#F0E5CD" stroke="#A28438" stroke-width="1.5" rx="6"/>
  <text x="462" y="246" font-family="system-ui,sans-serif" font-size="9" font-weight="800" fill="#A28438" letter-spacing="0.12em">PARTIALLY ADDRESSABLE</text>
  <text x="462" y="266" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#A28438">Environment-driven cues</text>
  <text x="462" y="282" font-family="system-ui,sans-serif" font-size="10" fill="#2A2A35">Prompt obfuscation, resource parity, scenario realism cut</text>
  <text x="462" y="296" font-family="system-ui,sans-serif" font-size="10" fill="#2A2A35">this category by 47.3% under current mitigation work.</text>
  <rect x="704.5" y="238" width="111.5" height="20" rx="10" fill="#A28438"/>
  <text x="760.2" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F0E5CD">47.3% reducible</text>
  <rect x="448" y="324" width="380" height="88" fill="#DEE3EC" stroke="#4F627F" stroke-width="1.5" rx="6"/>
  <text x="462" y="342" font-family="system-ui,sans-serif" font-size="9" font-weight="800" fill="#4F627F" letter-spacing="0.12em">BEST-CASE CEILING</text>
  <text x="462" y="362" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#4F627F">32.8% realism win rate</text>
  <text x="462" y="378" font-family="system-ui,sans-serif" font-size="10" fill="#2A2A35">Real system prompts and deployment resources deployed;</text>
  <text x="462" y="392" font-family="system-ui,sans-serif" font-size="10" fill="#2A2A35">models still detect audit transcripts in most runs.</text>
  <rect x="711.0" y="334" width="105.0" height="20" rx="10" fill="#4F627F"/>
  <text x="763.5" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#DEE3EC">32.8% win rate</text>
  <text x="448" y="432" font-family="system-ui,sans-serif" font-size="9.5" fill="#6B6873">Source: Kirk et al., UK AI Security Institute, 2026.</text>

  <text x="430" y="516" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-style="italic" font-weight="600" fill="#823F30">Even best-case evaluation conditions leave models able to detect oversight contexts.</text>

</svg>
