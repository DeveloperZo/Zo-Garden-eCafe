<svg viewBox="0 0 700 582" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="viz-capital-title viz-capital-desc">
  <title id="viz-capital-title">Five-way capital and revenue loop between AI industry actors</title>
  <desc id="viz-capital-desc">Five identical boxes at regular pentagon vertices (center 350,225 r=175) connected by smooth clockwise circular arcs with uniform radius. A dashed interior line shows Investors funding AI Labs directly.</desc>
  <defs>
    <style>
      :root {
        --bg: #FAFAF8;
        --muted: #6B6B85;
        --red: #C94B2E;
        --amber: #C9880A;
        --blue: #3A5498;
        --green: #2A7A5F;
        --red-soft: #FDE8E3;
        --blue-soft: #E3E8F5;
        --green-soft: #EDF7F3;
        --amber-soft: #FEF8E8;
        --junction-violet: #5B3A8C;
        --junction-teal: #1F8B8B;
        --junction-sage: #5A8060;
        --junction-amber: #A8862C;
        --junction-plum: #7A2E5C;
        --paper: #F5F1E8;
        --chip-surface: #FFFFFF;
        --gchip1: #ECE6FA; --gchip2: #D8E9F2;
        --glab1: #E6DDF8; --glab2: #E5D5E6;
        --gusers1: #DFF1EC; --gusers2: #D5E9E2;
        --ghyper1: #E3F0F0; --ghyper2: #DCE6F6;
        --ginvest1: #F7EDD7; --ginvest2: #F3E2C7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23;
          --muted: #C2C9D9;
          --red: #FF8C73;
          --amber: #F2BE5C;
          --blue: #8EACFF;
          --green: #63C7A3;
          --red-soft: #4A2A28;
          --blue-soft: #2A3554;
          --green-soft: #243E36;
          --amber-soft: #453A22;
          --junction-violet: #B9A2E8;
          --junction-teal: #73D2CE;
          --junction-sage: #90C19B;
          --junction-amber: #D7B06A;
          --junction-plum: #C78CB5;
          --paper: #171A21;
          --chip-surface: #242A36;
          --gchip1: #2F2A4A; --gchip2: #2A3550;
          --glab1: #352D4A; --glab2: #3C2C40;
          --gusers1: #263E3A; --gusers2: #273D39;
          --ghyper1: #243842; --ghyper2: #2A3650;
          --ginvest1: #403526; --ginvest2: #3C3123;
        }
      }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      #g-chip stop:nth-child(1) { stop-color: var(--gchip1); }
      #g-chip stop:nth-child(2) { stop-color: var(--gchip2); }
      #g-lab stop:nth-child(1) { stop-color: var(--glab1); }
      #g-lab stop:nth-child(2) { stop-color: var(--glab2); }
      #g-users stop:nth-child(1) { stop-color: var(--gusers1); }
      #g-users stop:nth-child(2) { stop-color: var(--gusers2); }
      #g-hyper stop:nth-child(1) { stop-color: var(--ghyper1); }
      #g-hyper stop:nth-child(2) { stop-color: var(--ghyper2); }
      #g-invest stop:nth-child(1) { stop-color: var(--ginvest1); }
      #g-invest stop:nth-child(2) { stop-color: var(--ginvest2); }
      [fill="#FAFAF8"] { fill: var(--bg); }
      [fill="#F5F1E8"] { fill: var(--paper); }
      [fill="#FFFFFF"] { fill: var(--chip-surface); }
      [fill="#6B6B85"] { fill: var(--muted); }
      [fill="#C94B2E"] { fill: var(--red); }
      [stroke="#C94B2E"] { stroke: var(--red); }
      [fill="#C9880A"] { fill: var(--amber); }
      [stroke="#C9880A"] { stroke: var(--amber); }
      [fill="#3A5498"] { fill: var(--blue); }
      [stroke="#3A5498"] { stroke: var(--blue); }
      [fill="#2A7A5F"] { fill: var(--green); }
      [stroke="#2A7A5F"] { stroke: var(--green); }
      [fill="#FDE8E3"] { fill: var(--red-soft); }
      [fill="#E3E8F5"] { fill: var(--blue-soft); }
      [fill="#EDF7F3"] { fill: var(--green-soft); }
      [fill="#FEF8E8"] { fill: var(--amber-soft); }
      [fill="#5B3A8C"] { fill: var(--junction-violet); }
      [stroke="#5B3A8C"] { stroke: var(--junction-violet); }
      [fill="#1F8B8B"] { fill: var(--junction-teal); }
      [stroke="#1F8B8B"] { stroke: var(--junction-teal); }
      [fill="#5A8060"] { fill: var(--junction-sage); }
      [stroke="#5A8060"] { stroke: var(--junction-sage); }
      [fill="#A8862C"] { fill: var(--junction-amber); }
      [stroke="#A8862C"] { stroke: var(--junction-amber); }
      [fill="#7A2E5C"] { fill: var(--junction-plum); }
      [stroke="#7A2E5C"] { stroke: var(--junction-plum); }
    </style>
    <linearGradient id="g-chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECE6FA"/>
      <stop offset="100%" stop-color="#D8E9F2"/>
    </linearGradient>
    <linearGradient id="g-lab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6DDF8"/>
      <stop offset="100%" stop-color="#E5D5E6"/>
    </linearGradient>
    <linearGradient id="g-users" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DFF1EC"/>
      <stop offset="100%" stop-color="#D5E9E2"/>
    </linearGradient>
    <linearGradient id="g-hyper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F0F0"/>
      <stop offset="100%" stop-color="#DCE6F6"/>
    </linearGradient>
    <linearGradient id="g-invest" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7EDD7"/>
      <stop offset="100%" stop-color="#F3E2C7"/>
    </linearGradient>
    <marker id="p-r"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth"><path d="M0,1 L9,5 L0,9 Z" fill="#5B3A8C"/></marker>
    <marker id="p-r2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth"><path d="M0,1 L9,5 L0,9 Z" fill="#7A2E5C" opacity="0.55"/></marker>
  </defs>

  <rect x="0" y="0" width="700" height="582" rx="8" fill="#F5F1E8"/>

  <!--
    Perfect 5-way symmetry:
    - Center C=(350,220)
    - Vertex radius R=170
    - Angles are 72° apart: -90, -18, 54, 126, 198
    - All loop arrows use the same circular radius: A 178 178 0 0 1
  -->

  <!-- ── STRAIGHT DASHED LINE: Investors → AI Labs direct shortcut ────────
       Both nodes sit at y=171 so this is a clean horizontal line.          -->
  <line x1="278.3" y1="167.5" x2="421.7" y2="167.5"
        stroke="#7A2E5C" stroke-width="1.5" stroke-linecap="round"
        stroke-dasharray="6,4" marker-end="url(#p-r2)" opacity="0.55"/>
  <text x="350" y="160" text-anchor="middle" font-size="10" fill="#C9880A" font-weight="600" opacity="0.85">direct equity investment</text>

  <!-- ── ARROWS ─────────────────────────────────────────────────────────── -->

  <!-- 1 -->
  <path d="M 393.1,47.3 A 178 178 0 0 1 500.9,125.7"
        stroke="#5B3A8C" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#p-r)"/>

  <!-- 2 -->
  <path d="M 527.6,207.6 A 178 178 0 0 1 486.4,334.4"
        stroke="#5B3A8C" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#p-r)"/>

  <!-- 3 -->
  <path d="M 450,387.5 A 178 178 0 0 1 250,387.5"
        stroke="#5B3A8C" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#p-r)"/>

  <!-- 4 -->
  <path d="M 213.6,334.4 A 178 178 0 0 1 172.4,207.6"
        stroke="#5B3A8C" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#p-r)"/>

  <!-- 5 -->
  <path d="M 199.1,125.7 A 178 178 0 0 1 306.9,47.3"
        stroke="#5B3A8C" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#p-r)"/>

  <!-- ── ARROW LABELS: borderless pills — soft fill only, no stroke ─────── -->

  <!-- 1 -->
  <rect x="440" y="63" width="120" height="20" rx="10" fill="#FFFFFF" stroke="#5B3A8C" stroke-width="1.2" opacity="0.95"/>
  <text x="500" y="77" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B3A8C">sell GPUs &amp; chips</text>

  <!-- 2 -->
  <rect x="488" y="276" width="94" height="20" rx="10" fill="#FFFFFF" stroke="#1F8B8B" stroke-width="1.2" opacity="0.95"/>
  <text x="535" y="290" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1F8B8B">AI products</text>

  <!-- 3 -->
  <rect x="302" y="426" width="96" height="20" rx="10" fill="#FFFFFF" stroke="#A8862C" stroke-width="1.2" opacity="0.95"/>
  <text x="350" y="440" text-anchor="middle" font-size="10.5" font-weight="600" fill="#A8862C">cloud spend</text>

  <!-- 4 -->
  <rect x="117" y="276" width="96" height="20" rx="10" fill="#FFFFFF" stroke="#5A8060" stroke-width="1.2" opacity="0.95"/>
  <text x="165" y="290" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5A8060">funding flows</text>

  <!-- 5 -->
  <rect x="140" y="63" width="120" height="20" rx="10" fill="#FFFFFF" stroke="#7A2E5C" stroke-width="1.2" opacity="0.95"/>
  <text x="200" y="77" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7A2E5C">fund hardware R&amp;D</text>

  <!-- ── NODES (drawn last — sits on top of arcs) ───────────────────────── -->

  <!-- V0 · CHIP MAKERS · top · blue -->
  <rect x="260" y="20" width="180" height="60" rx="10"
        fill="url(#g-chip)" stroke="#3A5498" stroke-width="2"/>
  <text x="350" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#3A5498">CHIP MAKERS</text>
  <text x="350" y="62" text-anchor="middle" font-size="11" fill="#3A5498">Nvidia · AMD · TSMC</text>

  <!-- V1 · AI LABS · upper-right · red -->
  <rect x="421.7" y="137.5" width="180" height="60" rx="10"
        fill="url(#g-lab)" stroke="#5B3A8C" stroke-width="2"/>
  <text x="511.7" y="162.5" text-anchor="middle" font-size="13" font-weight="700" fill="#C94B2E">AI LABS</text>
  <text x="511.7" y="179.5" text-anchor="middle" font-size="11" fill="#C94B2E">OpenAI · Anthropic · xAI</text>

  <!-- V2 · USERS & REVENUE · lower-right · green · single-line primary -->
  <rect x="359.9" y="327.5" width="180" height="60" rx="10"
        fill="url(#g-users)" stroke="#5A8060" stroke-width="2"/>
  <text x="449.9" y="362.5" text-anchor="middle" font-size="13" font-weight="700" fill="#2A7A5F">USERS &amp; REVENUE</text>

  <!-- V3 · HYPERSCALERS · lower-left · blue -->
  <rect x="160.1" y="327.5" width="180" height="60" rx="10"
        fill="url(#g-hyper)" stroke="#1F8B8B" stroke-width="2"/>
  <text x="250.1" y="352.5" text-anchor="middle" font-size="12" font-weight="700" fill="#3A5498">HYPERSCALERS</text>
  <text x="250.1" y="369.5" text-anchor="middle" font-size="11" fill="#3A5498">Microsoft · Google · AWS</text>

  <!-- V4 · INVESTORS · upper-left · amber -->
  <rect x="98.3" y="137.5" width="180" height="60" rx="10"
        fill="url(#g-invest)" stroke="#A8862C" stroke-width="2"/>
  <text x="188.3" y="162.5" text-anchor="middle" font-size="13" font-weight="700" fill="#C9880A">INVESTORS</text>
  <text x="188.3" y="179.5" text-anchor="middle" font-size="11" fill="#C9880A">VCs · sovereign funds</text>

  <!-- ── LEGEND ─────────────────────────────────────────────────────────── -->
  <line x1="28" y1="472" x2="58" y2="472" stroke="#C94B2E" stroke-width="2.5"/>
  <text x="64" y="476" font-size="10.5" fill="#6B6B85">solid = capital &amp; product flow (reinforcing loop, clockwise)</text>
  <line x1="28" y1="488" x2="58" y2="488" stroke="#C94B2E" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.55"/>
  <text x="64" y="492" font-size="10.5" fill="#6B6B85">dashed = direct equity shortcut (Investors &#x2192; AI Labs)</text>

  <text x="350" y="514" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B85">DIA-002B — The AI Capital Ring: all five curved arrows form a clockwise self-amplifying loop,</text>
  <text x="350" y="528" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B85">each node profits from the others' growth. The dashed arc shows direct equity investment from investors</text>
  <text x="350" y="542" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B85">into labs, bypassing the circular path. Nvidia holds equity stakes in OpenAI, CoreWeave, and other</text>
  <text x="350" y="556" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B85">labs it sells chips to: a circular profit relationship layered on top of the customer relationship.</text>
</svg>
