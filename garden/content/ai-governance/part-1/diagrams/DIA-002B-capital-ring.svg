<svg viewBox="0 0 860 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d2b-t d2b-d">
  <title id="d2b-t">DIA-002B · Why even dissent funds the loop</title>
  <desc id="d2b-d">A two-path flow diagram. Input: a safety concern raised inside an AI lab. Expected path (top, dashed gray): the lab slows, internal correction activates, aggregate frontier capability decreases. Actual path (bottom, solid rust): the dissenting researcher departs, raises capital, founds a new frontier lab — and that lab grows larger than the one they left. The proof point: Anthropic, founded in 2021 by ex-OpenAI safety researchers, is in May 2026 raising at a $900B valuation against OpenAI's $852B. A self-correcting input becomes a self-amplifying one. This is why the loop accelerates.</desc>
  <defs>
    <style>
      :root {
        --bg: #FAFAF8; --paper: #F2EEE3; --panel: #FFFDF8;
        --muted: #6B6873; --muted2: #9D9A95; --line: #E2DFD6;
        --rust: #A85B49; --rust-soft: #EDD8CE; --rust-deep: #823F30;
        --gray-soft: #F0EDE3;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23; --paper: #1E2128; --panel: #242834;
          --muted: #B8B5AD; --muted2: #908D87; --line: #3E3D38;
          --rust: #D29183; --rust-soft: #3D2925; --rust-deep: #E3A292;
          --gray-soft: #2A2F3A;
        }
      }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      [fill="#FAFAF8"] { fill: var(--bg); } [fill="#F2EEE3"] { fill: var(--paper); } [fill="#FFFDF8"] { fill: var(--panel); }
      [fill="#6B6873"] { fill: var(--muted); }
      [fill="#9D9A95"] { fill: var(--muted2); } [stroke="#9D9A95"] { stroke: var(--muted2); }
      [fill="#E2DFD6"] { fill: var(--line); } [stroke="#E2DFD6"] { stroke: var(--line); }
      [fill="#A85B49"] { fill: var(--rust); } [stroke="#A85B49"] { stroke: var(--rust); }
      [fill="#EDD8CE"] { fill: var(--rust-soft); }
      [stroke="#823F30"] { stroke: var(--rust-deep); } [fill="#823F30"] { fill: var(--rust-deep); }
      [fill="#F0EDE3"] { fill: var(--gray-soft); }
    </style>
    <marker id="d2b-rust" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#A85B49"/>
    </marker>
    <marker id="d2b-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9D9A95"/>
    </marker>
  </defs>

  <rect width="860" height="430" fill="#F2EEE3"/>

  <!-- HEADER -->
  <text x="430" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#A85B49" letter-spacing="0.04em">DIA-002B · WHY EVEN DISSENT FUNDS THE LOOP</text>
  <text x="430" y="52" text-anchor="middle" font-size="12" fill="#6B6873">expected: internal criticism slows the lab · actual: dissent capitalizes the next frontier — larger than what it left</text>

  <!-- ── INPUT NODE ── -->
  <rect x="20" y="170" width="175" height="64" fill="#EDD8CE" stroke="#A85B49" stroke-width="1.8" rx="6"/>
  <text x="107" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#A85B49">SAFETY CONCERN</text>
  <text x="107" y="212" text-anchor="middle" font-size="10.5" fill="#A85B49">raised inside a lab</text>
  <text x="107" y="226" text-anchor="middle" font-size="9" font-style="italic" fill="#A85B49" opacity="0.85">(internal disagreement)</text>

  <!-- Arrow: input → junction -->
  <line x1="195" y1="202" x2="234" y2="202" stroke="#A85B49" stroke-width="2" marker-end="url(#d2b-rust)"/>

  <!-- Junction dot -->
  <circle cx="240" cy="202" r="5" fill="#A85B49"/>

  <!-- ── TOP BRANCH: EXPECTED (dashed gray, upward) ── -->
  <line x1="240" y1="197" x2="240" y2="130" stroke="#9D9A95" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="240" y1="130" x2="295" y2="130" stroke="#9D9A95" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#d2b-gray)"/>

  <!-- Top box: expected outcome -->
  <rect x="295" y="92" width="350" height="76" fill="#F0EDE3" stroke="#9D9A95" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="470" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#9D9A95" letter-spacing="0.05em">EXPECTED · self-correcting</text>
  <text x="470" y="135" text-anchor="middle" font-size="10.5" fill="#9D9A95" class="serif" font-style="italic">lab pauses · capability growth slows</text>
  <text x="470" y="153" text-anchor="middle" font-size="10.5" fill="#9D9A95" class="serif" font-style="italic">aggregate frontier capability: ↓ reduced</text>

  <!-- ── BOTTOM BRANCH: ACTUAL (solid rust, downward) ── -->
  <line x1="240" y1="207" x2="240" y2="290" stroke="#A85B49" stroke-width="2.5"/>
  <line x1="240" y1="290" x2="295" y2="290" stroke="#A85B49" stroke-width="2.5" marker-end="url(#d2b-rust)"/>

  <!-- Bottom box: actual outcome -->
  <rect x="295" y="246" width="350" height="100" fill="#EDD8CE" stroke="#A85B49" stroke-width="2" rx="6"/>
  <text x="470" y="269" text-anchor="middle" font-size="11" font-weight="700" fill="#A85B49" letter-spacing="0.05em">ACTUAL · self-amplifying</text>
  <text x="470" y="289" text-anchor="middle" font-size="10.5" fill="#A85B49" class="serif">researcher departs → founds rival → raises capital</text>
  <text x="470" y="305" text-anchor="middle" font-size="10.5" fill="#A85B49" class="serif">aggregate frontier capability: <tspan font-weight="700">↑ increased</tspan></text>
  <text x="470" y="328" text-anchor="middle" font-size="10" font-weight="700" fill="#823F30">the new lab grows larger than the lab it left</text>

  <!-- ── PROOF POINT panel (right side) ── -->
  <rect x="660" y="92" width="190" height="254" rx="8" fill="#FFFDF8" stroke="#823F30" stroke-width="1.5"/>
  <text x="755" y="114" text-anchor="middle" font-size="10.5" font-weight="700" fill="#823F30" letter-spacing="0.06em">PROOF, MAY 2026</text>
  <line x1="676" y1="124" x2="836" y2="124" stroke="#E2DFD6" stroke-width="1"/>

  <!-- 2021 -->
  <text x="676" y="146" font-size="10" font-weight="700" fill="#A85B49" class="serif">2021</text>
  <text x="676" y="162" font-size="9.5" fill="#6B6873">ex-OpenAI safety</text>
  <text x="676" y="174" font-size="9.5" fill="#6B6873">researchers found</text>
  <text x="676" y="186" font-size="9.5" font-weight="700" fill="#6B6873">Anthropic</text>

  <!-- separator -->
  <line x1="676" y1="200" x2="836" y2="200" stroke="#E2DFD6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- May 2026 -->
  <text x="676" y="220" font-size="10" font-weight="700" fill="#A85B49" class="serif">May 2026</text>
  <text x="676" y="238" font-size="11" font-weight="700" fill="#A85B49">Anthropic: $900B</text>
  <text x="676" y="252" font-size="9.5" fill="#6B6873">target valuation, $50B round</text>

  <text x="676" y="276" font-size="11" font-weight="700" fill="#6B6873">OpenAI: $852B</text>
  <text x="676" y="290" font-size="9.5" fill="#6B6873">March 2026 round</text>

  <!-- conclusion line -->
  <line x1="676" y1="304" x2="836" y2="304" stroke="#823F30" stroke-width="1"/>
  <text x="755" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#823F30">$48B more</text>
  <text x="755" y="335" text-anchor="middle" font-size="9" font-style="italic" fill="#823F30">than the lab it left</text>

  <!-- ── BOTTOM CAPTION ── -->
  <line x1="40" y1="368" x2="820" y2="368" stroke="#E2DFD6" stroke-width="1"/>
  <text x="430" y="389" text-anchor="middle" font-size="11" fill="#6B6873">A self-correcting input — internal dissent — becomes a self-amplifying one. The loop captures its own opposition.</text>
  <text x="430" y="409" text-anchor="middle" font-size="12" font-weight="700" fill="#A85B49">This is one reason the buildout cannot slow itself. Even leaving feeds it.</text>
</svg>
