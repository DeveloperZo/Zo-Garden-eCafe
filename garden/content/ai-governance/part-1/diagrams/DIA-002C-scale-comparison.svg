<svg viewBox="0 0 900 530" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="d3-t d3-d">
  <title id="d3-t">DIA-002C — Scale: Investment vs. Accountability, Same Dollar Axis</title>
  <desc id="d3-d">Mirrored bar chart on a shared $1.4T scale. Left side (red): hyperscaler capex $448B and OpenAI commitments $1.4T. Right side (blue): OpenAI revenue $25B and global AI fines $400K — both too small to appear at this scale. A circle marks the right-side region; expanding connector lines lead to a zoom inset panel showing both amounts at a $30B scale.</desc>

  <defs>
    <style>
      :root {
        --bg: #FAFAF8;
        --surface-a: #FAFAFA;
        --surface-b: #FFFFFF;
        --surface-blue: #F5F7FD;
        --surface-blue-alt: #EEF2FA;
        --text: #1C1C2E;
        --text-strong: #3A3A4A;
        --muted: #6B6B85;
        --muted-2: #9B9BA8;
        --red: #C94B2E;
        --red-soft: #FDE8E3;
        --blue: #3A5498;
        --blue-soft: #E3E8F5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1B1D23;
          --surface-a: #21252F;
          --surface-b: #1C2029;
          --surface-blue: #202A3D;
          --surface-blue-alt: #26324A;
          --text: #E8ECF5;
          --text-strong: #D6DEEE;
          --muted: #C2C9D9;
          --muted-2: #A8B3C7;
          --red: #FF8C73;
          --red-soft: #4A2A28;
          --blue: #8EACFF;
          --blue-soft: #2A3554;
        }
      }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      [fill="#FAFAF8"] { fill: var(--bg); }
      [fill="#FAFAFA"] { fill: var(--surface-a); }
      [fill="#FFFFFF"] { fill: var(--surface-b); }
      [fill="#F5F7FD"] { fill: var(--surface-blue); }
      [fill="#EEF2FA"] { fill: var(--surface-blue-alt); }
      [fill="#1C1C2E"] { fill: var(--text); }
      [stroke="#1C1C2E"] { stroke: var(--text); }
      [fill="#3A3A4A"] { fill: var(--text-strong); }
      [fill="#6B6B85"] { fill: var(--muted); }
      [fill="#9B9BA8"] { fill: var(--muted-2); }
      [stroke="#9B9BA8"] { stroke: var(--muted-2); }
      [fill="#C94B2E"] { fill: var(--red); }
      [stroke="#C94B2E"] { stroke: var(--red); }
      [fill="#FDE8E3"] { fill: var(--red-soft); }
      [fill="#3A5498"] { fill: var(--blue); }
      [stroke="#3A5498"] { stroke: var(--blue); }
      [fill="#E3E8F5"] { fill: var(--blue-soft); }
    </style>
  </defs>

  <rect width="900" height="530" fill="#FAFAF8" rx="8"/>

  <!-- ── Title ── -->
  <text x="450" y="22" font-size="13" font-weight="800" fill="#1C1C2E" text-anchor="middle">Scale: Investment (left) vs. Accountability / Revenue (right)</text>
  <text x="450" y="38" font-size="9.5" fill="#6B6B85" text-anchor="middle">Same dollar scale both directions · $0 at center · max bar = $1.4T</text>

  <!-- Centre axis -->
  <line x1="450" y1="48" x2="450" y2="242" stroke="#1C1C2E" stroke-width="2"/>
  <text x="450" y="46" font-size="10" font-weight="700" fill="#1C1C2E" text-anchor="middle">$0</text>

  <!-- Row bands -->
  <rect x="0" y="56"  width="900" height="44" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="104" width="900" height="44" fill="#FFFFFF"/>
  <rect x="0" y="152" width="900" height="44" fill="#FAFAFA" opacity="0.6"/>
  <rect x="0" y="200" width="900" height="44" fill="#FFFFFF"/>

  <!-- ── ROW 1 LEFT · Hyperscaler capex · $448B ── -->
  <!-- bar_px = 448/1400 × 250 = 80px · rect x=370 -->
  <text x="194" y="78" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">Hyperscaler capex 2025</text>
  <rect x="370" y="61" width="80" height="34" rx="4" fill="#FDE8E3" stroke="#C94B2E" stroke-width="1.5"/>
  <text x="364" y="78" font-size="10.5" font-weight="700" fill="#C94B2E" text-anchor="end" dominant-baseline="middle">$448B</text>

  <!-- ── ROW 2 LEFT · OpenAI commitments · $1.4T ── -->
  <!-- bar_px = 250 (full) · rect x=200 -->
  <text x="194" y="126" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="end" dominant-baseline="middle">OpenAI commitments (8 yr)</text>
  <rect x="200" y="109" width="250" height="34" rx="4" fill="#FDE8E3" stroke="#C94B2E" stroke-width="2"/>
  <text x="208" y="126" font-size="10.5" font-weight="700" fill="#C94B2E" text-anchor="start" dominant-baseline="middle">$1.4T</text>

  <!-- ── ROW 3 RIGHT · OpenAI revenue · ~$25B ── -->
  <!-- bar_px = 25/1400 × 250 = 4.5 → 8px forced min -->
  <text x="648" y="174" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="start" dominant-baseline="middle">OpenAI revenue (ARR)</text>
  <rect x="450" y="157" width="8" height="34" rx="2" fill="#FFFFFF" stroke="#3A5498" stroke-width="1.5"/>
  <text x="463" y="174" font-size="10.5" font-weight="700" fill="#3A5498" text-anchor="start" dominant-baseline="middle">~$25B</text>
  <text x="498" y="174" font-size="9.5" fill="#9B9BA8" font-style="italic" dominant-baseline="middle">— less than 1px at this scale</text>

  <!-- ── ROW 4 RIGHT · Global AI fines · ~$400K ── -->
  <text x="648" y="222" font-size="11" font-weight="600" fill="#1C1C2E" text-anchor="start" dominant-baseline="middle">Global AI fines to date</text>
  <rect x="450" y="205" width="5" height="34" rx="2" fill="#3A5498" stroke="#3A5498" stroke-width="1"/>
  <text x="460" y="222" font-size="10.5" font-weight="700" fill="#3A5498" text-anchor="start" dominant-baseline="middle">~$400K</text>
  <text x="502" y="222" font-size="9.5" fill="#9B9BA8" font-style="italic" dominant-baseline="middle">— less than 1px at this scale</text>

  <!-- ── Axis ── -->
  <line x1="200" y1="252" x2="450" y2="252" stroke="#C94B2E" stroke-width="1.5" opacity="0.45"/>
  <line x1="450" y1="252" x2="700" y2="252" stroke="#3A5498" stroke-width="1.5" opacity="0.45"/>
  <g font-size="8.5" fill="#6B6B85" text-anchor="middle">
    <line x1="388" y1="248" x2="388" y2="256" stroke="#9B9BA8"/><text x="388" y="268">$350B</text>
    <line x1="325" y1="248" x2="325" y2="256" stroke="#9B9BA8"/><text x="325" y="268">$700B</text>
    <line x1="263" y1="248" x2="263" y2="256" stroke="#9B9BA8"/><text x="263" y="268">$1.05T</text>
    <line x1="200" y1="248" x2="200" y2="256" stroke="#9B9BA8"/><text x="200" y="268">$1.4T</text>
    <line x1="513" y1="248" x2="513" y2="256" stroke="#9B9BA8"/><text x="513" y="268">$350B</text>
    <line x1="575" y1="248" x2="575" y2="256" stroke="#9B9BA8"/><text x="575" y="268">$700B</text>
    <line x1="638" y1="248" x2="638" y2="256" stroke="#9B9BA8"/><text x="638" y="268">$1.05T</text>
    <line x1="700" y1="248" x2="700" y2="256" stroke="#9B9BA8"/><text x="700" y="268">$1.4T</text>
  </g>
  <text x="325" y="282" font-size="9" font-weight="700" fill="#C94B2E" text-anchor="middle">← Investment &amp; commitments</text>
  <text x="575" y="282" font-size="9" font-weight="700" fill="#3A5498" text-anchor="middle">Revenue &amp; enforcement →</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ZOOM VISUAL CONNECTOR                                    -->
  <!-- Circle marks right-side near-invisible region           -->
  <!-- Lines expand to zoom inset below                        -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Connector lines — drawn before zoom panel -->
  <!-- Left:  bottom-left of circle → top-left corner of zoom panel  -->
  <!-- Right: bottom-right of circle → top-right corner of zoom panel -->
  <line x1="428" y1="218" x2="135" y2="358" stroke="#9B9BA8" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.65"/>
  <line x1="512" y1="220" x2="765" y2="358" stroke="#9B9BA8" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.65"/>

  <!-- ── Zoom inset panel ── -->
  <!-- Scale: $30B = 580px · bars from x=185 to x=765 -->
  <rect x="105" y="358" width="675" height="100" fill="#FFFFFF" stroke="#3A5498" stroke-width="1.5" rx="6"/>

  <!-- Revenue $25B: 25/30 × 580 = 483px, end x=668 -->
  <rect x="135" y="363" width="630" height="21" fill="#FAFAFA"/>
  <text x="178" y="374" text-anchor="end" dominant-baseline="middle" font-size="9.5" font-weight="600" fill="#3A3A4A">Revenue (ARR)</text>
  <rect x="185" y="366" width="483" height="15" fill="#E3E8F5" stroke="#3A5498" stroke-width="1.5" rx="3"/>
  <text x="672" y="374" dominant-baseline="middle" font-size="9.5" font-weight="700" fill="#3A5498">  ~$25B</text>

  <!-- Fines $400K: still not visible even at $30B scale → 5px forced min -->
  <rect x="135" y="387" width="630" height="21" fill="#FFFFFF"/>
  <text x="178" y="398" text-anchor="end" dominant-baseline="middle" font-size="9.5" font-weight="600" fill="#3A3A4A">Global fines</text>
  <rect x="185" y="390" width="5"   height="15" fill="#3A5498" rx="1"/>
  <text x="194" y="398" dominant-baseline="middle" font-size="9.5" font-weight="700" fill="#3A5498">~$400K</text>
  <text x="254" y="398" dominant-baseline="middle" font-size="8.5" font-style="italic" fill="#9B9BA8">(still less than 1px — even at this scale)</text>

  <!-- Zoom axis -->
  <line x1="185" y1="432" x2="765" y2="432" stroke="#9B9BA8" stroke-width="1"/>
  <g font-size="8.5" fill="#9B9BA8" text-anchor="middle">
    <line x1="185" y1="428" x2="185" y2="436" stroke="#9B9BA8"/><text x="185" y="446">$0</text>
    <line x1="378" y1="428" x2="378" y2="436" stroke="#9B9BA8"/><text x="378" y="446">$10B</text>
    <line x1="572" y1="428" x2="572" y2="436" stroke="#9B9BA8"/><text x="572" y="446">$20B</text>
    <line x1="765" y1="428" x2="765" y2="436" stroke="#9B9BA8"/><text x="765" y="446">$30B</text>
  </g>

  <!-- ── Circle — drawn last, on top of main chart ── -->
  <!-- Encompasses both right-side near-invisible rows (y=152–244) -->
  <circle cx="470" cy="196" r="48" fill="#E3E8F5" fill-opacity="0.25" stroke="#3A5498" stroke-width="1.75"/>

  <rect x="28" y="458" width="844" height="66" rx="6" fill="#FFFFFF" opacity="0.68"/>
  <text x="40" y="476" font-size="10.5" font-style="italic" fill="#6B6B85">DIA-002C — Mirrored scale from $0 at center: commitments and hyperscaler capex extend left, while realized revenue and cumulative global AI fines extend right on the same axis.</text>
  <text x="40" y="490" font-size="10.5" font-style="italic" fill="#6B6B85">Revenue is a thin bar; fines are labeled but not drawn to width at this range. IMF April 2026: "circular financing within the AI ecosystem" was flagged as an emerging systemic risk.</text>
  <text x="40" y="504" font-size="10.5" font-style="italic" fill="#6B6B85">That was the first time a major multilateral institution formally named the loop structure as a financial concern.</text>
</svg>
